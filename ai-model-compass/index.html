<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 AI 大模型全景对比 - Searchable Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .region-tag { font-size: 0.65rem; padding: 1px 6px; border-radius: 9999px; font-weight: 700; text-transform: uppercase; }
        .tag-Global { background-color: #DBEAFE; color: #1E40AF; }
        .tag-China { background-color: #DCFCE7; color: #166534; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">
    <nav class="bg-white/80 backdrop-blur-md shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">AI</div>
                <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">AI Model Compass</span>
            </div>
            <div class="flex-1 max-w-md mx-8">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="搜索模型、厂商、功能..." 
                           class="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all bg-gray-50 focus:bg-white">
                    <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
            </div>
            <div class="hidden md:flex gap-4">
                <span class="text-xs text-gray-400 self-center">Updated: Feb 2026</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Hero Section -->
        <div class="mb-12 text-center md:text-left">
            <h1 class="text-3xl font-extrabold tracking-tight text-gray-900 sm:text-4xl">2026 AI 大模型全景评测</h1>
            <p class="mt-3 text-lg text-gray-500">深度对比全球与中国最强 AI 模型，助您快速锁定最佳选择。</p>
        </div>

        <!-- Filters -->
        <div class="flex flex-wrap gap-4 mb-8 items-center justify-between">
            <div class="flex gap-2 bg-gray-100 p-1 rounded-xl">
                <button onclick="filterByRegion('All')" class="filter-btn px-4 py-1.5 rounded-lg text-sm font-medium bg-white shadow-sm text-blue-600" data-region="All">全部模型</button>
                <button onclick="filterByRegion('Global')" class="filter-btn px-4 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:text-blue-600" data-region="Global">全球领先</button>
                <button onclick="filterByRegion('China')" class="filter-btn px-4 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:text-blue-600" data-region="China">中国国内</button>
            </div>
            <div class="text-sm text-gray-500">
                匹配到 <span id="modelCount" class="font-bold text-blue-600">0</span> 个结果
            </div>
        </div>

        <!-- Comparison Table (Desktop Only) -->
        <div class="hidden lg:block bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-12">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-gray-50/50 text-gray-500 text-xs uppercase tracking-wider">
                        <th class="px-6 py-4 font-semibold">模型 & 开发者</th>
                        <th class="px-6 py-4 font-semibold">推理等级</th>
                        <th class="px-6 py-4 font-semibold">上下文</th>
                        <th class="px-6 py-4 font-semibold">核心优势</th>
                        <th class="px-6 py-4 font-semibold">最佳用途</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-100">
                    <!-- Rows injected by JS -->
                </tbody>
            </table>
        </div>

        <!-- Grid View (Mobile & Alternative) -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="gridView">
            <!-- Cards injected by JS -->
        </div>
    </main>

    <footer class="max-w-7xl mx-auto px-4 py-12 border-t mt-20 text-center">
        <p class="text-gray-400 text-sm">基于 2026 年行业实测数据构建 | 开发者工具集</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
